<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JustDoIt! - Tareas de Usuario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<div class="container">

    <!-- Left column -->
    <aside class="sidebar">
        <div class="logo">
            <a th:href="@{/}"><img th:src="@{/images/JustDoIt.png}" alt="JustDoIt Logo" width="200" height="200"></a>
        </div>
        <nav class="navigation">
            <h3>Tareas</h3>
            <ul>
                <li><a th:href="@{/user/tasks}">Tareas de usuario actual</a></li>
                <li><a th:href="@{/user/tasks/report}">Reporte de tareas</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Right column -->
    <main class="content">
        <h1>Tareas de usuario</h1>

        <!-- User info usando fragmento -->
        <div th:replace="fragments/user-info :: userInfo(${user})"></div>

        <!-- Tasks grouped by status -->
        <div class="tasks-grid">
            <div th:replace="fragments/tasks-group :: tasksGroup('PENDING', ${newTask}, ${user})"></div>
            <div th:replace="fragments/tasks-group :: tasksGroup('INPROGRESS', ${newTask}, ${user})"></div>
            <div th:replace="fragments/tasks-group :: tasksGroup('DONE', ${newTask}, ${user})"></div>
        </div>

    </main>
</div>
</body>
</html>
